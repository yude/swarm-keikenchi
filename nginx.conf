server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /api/foursquare/ {
        proxy_pass https://api.foursquare.com/;
        proxy_set_header Host api.foursquare.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /config.js {
        return 200 'window.__CONFIG__ = {
            foursquareClientId: "${VITE_FOURSQUARE_CLIENT_ID}",
            foursquareClientSecret: "${VITE_FOURSQUARE_CLIENT_SECRET}"
        };';
        add_header Content-Type application/javascript;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
}
