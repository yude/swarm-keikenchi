apiVersion: apps/v1
kind: Deployment
metadata:
  name: keikenchi-map
  labels:
    app: keikenchi-map
spec:
  replicas: 2
  selector:
    matchLabels:
      app: keikenchi-map
  template:
    metadata:
      labels:
        app: keikenchi-map
    spec:
      containers:
        - name: keikenchi-map
          image: keikenchi-map:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
